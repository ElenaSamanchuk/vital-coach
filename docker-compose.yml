services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vital
      POSTGRES_PASSWORD: vitalcoach_secret
      POSTGRES_DB: vital_coach
    ports:
      - "5432:5432"
    volumes:
      - vital_coach_pg:/var/lib/postgresql/data

volumes:
  vital_coach_pg:
