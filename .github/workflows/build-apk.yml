name: Build Android APK

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - run: npm ci

      - name: Add Capacitor Android
        run: |
          npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6
          npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: App icons and Android label (after cap sync)
        run: npm run generate:icons

      - name: Build release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: potok-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Publish APK to GitHub Release (latest)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          gh release delete apk-latest -y 2>/dev/null || true
          gh release create apk-latest \
            --title "Поток — APK (последняя сборка)" \
            --notes "Автосборка release из \`${{ github.sha }}\`: ${{ github.event.head_commit.message }}" \
            android/app/build/outputs/apk/release/app-release.apk#potok.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach APK to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
